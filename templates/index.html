<!DOCTYPE html>
<html>
<head>
    <title>autoContents 目录生成工具</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            background-color: #f3f4f6;
            color: #1f2937;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 15px;
        }
        .header h2 {
            margin: 0;
            color: #111827;
        }
        .form-select, input[type="number"], input[type="text"], .prompt-input {
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            width: 100%;
            box-sizing: border-box;
            font-size: 14px;
            transition: all 0.2s ease;
            background-color: #fff;
        }
        .form-select:focus, input[type="number"]:focus, input[type="text"]:focus, .prompt-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .prompt-input {
            min-height: 100px;
            resize: vertical;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }
        button {
            transition: all 0.2s ease;
        }
        .test-btn {
            background-color: #6366f1;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        .test-btn:hover {
            background-color: #4f46e5;
            transform: translateY(-1px);
        }
        .file-input-container {
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .file-input-container button {
            background-color: #3b82f6;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }
        .file-input-container button:hover {
            background-color: #2563eb;
            transform: translateY(-1px);
        }
        .file-name {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #4b5563;
        }
        .remove-file {
            color: #9ca3af;
            cursor: pointer;
            border: none;
            background: none;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .remove-file:hover {
            color: #ef4444;
            background-color: #fee2e2;
            border-radius: 4px;
        }
        .progress-container {
            margin: 25px 0;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress {
            width: 0%;
            height: 100%;
            background-color: #10b981;
            transition: width 0.4s ease;
        }
        .status {
            margin: 10px 0;
            text-align: center;
            color: #6b7280;
            font-size: 14px;
        }
        .log {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 13px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            line-height: 1.6;
        }
        .error { color: #ef4444; }
        .warning { color: #f59e0b; }
        .success { color: #10b981; }
        
        button#startButton {
            width: 100%;
            background-color: #10b981;
            color: white;
            padding: 14px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-top: 10px;
        }
        button#startButton:hover:not(:disabled) {
            background-color: #059669;
            transform: translateY(-1px);
        }
        button#startButton:disabled {
            background-color: #d1d5db;
            cursor: not-allowed;
        }
        .hidden { display: none; }
        
        .collapsible-wrapper {
            margin-top: 20px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background-color: #f9fafb;
            overflow: hidden;
        }
        .collapsible-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            cursor: pointer;
            user-select: none;
            background-color: #f9fafb;
            transition: background-color 0.2s;
        }
        .collapsible-header:hover {
            background-color: #f3f4f6;
        }
        .collapsible-header h3 {
            margin: 0;
            font-size: 15px;
            color: #374151;
            font-weight: 600;
        }
        .collapsible-content {
            display: none;
            padding: 20px;
            background-color: #ffffff;
            border-top: 1px solid #e5e7eb;
        }
        .collapsible-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .chevron {
            transition: transform 0.3s ease;
            color: #6b7280;
        }
        .chevron.active {
            transform: rotate(180deg);
        }
        .llm-config-section, .prompt-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .save-btn {
            align-self: flex-start;
            background-color: #6366f1;
            color: white;
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            margin-top: 5px;
        }
        .save-btn:hover:not(:disabled) {
            background-color: #4f46e5;
        }
        .save-btn:disabled {
            background-color: #d1d5db;
            cursor: not-allowed;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(2px);
        }
        .modal-content {
            background-color: #ffffff;
            margin: 10% auto;
            padding: 25px;
            border: none;
            width: 90%;
            max-width: 500px;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .close {
            color: #9ca3af;
            float: right;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            line-height: 1;
        }
        .close:hover { color: #374151; }
        
        .footer-links {
            text-align: center;
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .footer-links a {
            color: #4f46e5;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }
        .footer-links a:hover {
            color: #312e81;
            text-decoration: underline;
        }
        .footer-text {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 30px;
        }



        /* 多任务卡片样式 */
        .task-card {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 15px;
        }
        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .task-filename {
            font-weight: 500;
            color: #374151;
            word-break: break-all;
            flex: 1;
            margin-right: 10px;
        }
        .task-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>autoContents 目录生成工具</h2>
            <button class="test-btn" onclick="testQwenService()">模型服务测试</button>
        </div>

        <div class="file-input-container">
            <input type="file" id="pdfFiles" accept=".pdf" multiple class="hidden">
            <button onclick="document.getElementById('pdfFiles').click()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                选择 PDF 文件（支持多选）
            </button>
            <div id="fileList" class="file-name" style="flex-direction: column; align-items: flex-start; gap: 5px;"></div>
        </div>

        <button id="startButton" onclick="startProcess()" disabled>开始执行</button>

        <div id="tasksContainer" style="margin-top: 20px; display: flex; flex-direction: column; gap: 20px;"></div>

        <div id="log" class="log" style="margin-top: 20px;"></div>
        
        <div class="collapsible-wrapper">
            <div class="collapsible-header" onclick="toggleCollapsible('llmContent', 'llmChevron')">
                <h3>模型配置管理</h3>
                <svg id="llmChevron" class="chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </div>
            <div id="llmContent" class="collapsible-content">
                <div class="llm-config-section">
                    <div class="input-group">
                        <label for="apiKey">API 密钥（若为环境变量请使用$符号包裹，否则直接输入 KEY 即可）</label>
                        <input type="text" id="apiKey" class="llm-config-input" placeholder="请输入 API 密钥...">
                    </div>
                    <div class="input-group">
                        <label for="baseUrl">Base URL（需以 v1 结尾）</label>
                        <input type="text" id="baseUrl" class="llm-config-input" placeholder="请输入 Base URL...">
                    </div>
                    <div class="input-group">
                        <label for="model">模型名称</label>
                        <input type="text" id="model" class="llm-config-input" placeholder="请输入模型名称...">
                    </div>
                    <button id="saveConfigBtn" class="save-btn" onclick="saveLLMConfig()" disabled>保存 LLM 配置</button>
                </div>
            </div>
        </div>
        
        <div class="collapsible-wrapper">
            <div class="collapsible-header" onclick="toggleCollapsible('sysLogContent', 'sysLogChevron')">
                <h3>系统日志</h3>
                <svg id="sysLogChevron" class="chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </div>
            <div id="sysLogContent" class="collapsible-content">
                <div id="sysLogContainer" class="log" style="background-color: #1e1e1e; color: #d4d4d4; max-height: 300px; margin-top: 0;"></div>
            </div>
        </div>

    </div>

    <div id="testModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeTestModal()">&times;</span>
            <h3 style="margin-top: 0;">服务状态测试结果</h3>
            <div id="testResult" style="margin-top: 15px; line-height: 1.5;"></div>
        </div>
    </div>

    <div class="footer-links">
        <a href="https://github.com/NatsUIJM/autoContents" target="_blank">GitHub</a>
        <a href="https://bbs.marginnote.com.cn/t/topic/59344/2" target="_blank">MarginNote</a>
        <a href="https://www.bilibili.com/video/BV14wKGeQEvr/" target="_blank">Bilibili</a>
        <a href="https://www.zhihu.com/question/392666875/answer/100357892412" target="_blank">知乎</a>
    </div>

    <script>
        let selectedFiles = [];
        const tasks = new Map();
        const MAX_RETRIES = 3;
        const RETRY_DELAY = 1000;
        const FETCH_TIMEOUT = 360000;
        const SCRIPT_CHECK_INTERVAL = 1000;
        let currentSessionId = null;
        let llmConfigModified = false;
        let logEventSource = null;

        function initSysLogStream() {
            if (logEventSource) {
                logEventSource.close();
            }
            logEventSource = new EventSource('/stream_log');
            const sysLogContainer = document.getElementById('sysLogContainer');
            
            logEventSource.onmessage = function(event) {
                const data = JSON.parse(event.data);
                const div = document.createElement('div');
                div.textContent = data.text;
                div.style.whiteSpace = 'pre-wrap';
                div.style.wordBreak = 'break-all';
                
                sysLogContainer.appendChild(div);
                
                while (sysLogContainer.childNodes.length > 500) {
                    sysLogContainer.removeChild(sysLogContainer.firstChild);
                }
                
                sysLogContainer.scrollTop = sysLogContainer.scrollHeight;
            };
            
            logEventSource.onerror = function(err) {
                console.error("日志流连接断开，浏览器将自动尝试重连...");
            };
        }

        window.addEventListener('DOMContentLoaded', function() {
            loadLLMConfig();
            initSysLogStream();
        });

        // ==================== 原有功能函数 ====================

        function toggleCollapsible(contentId, chevronId) {
            const content = document.getElementById(contentId);
            const chevron = document.getElementById(chevronId);
            
            if (content.classList.contains('active')) {
                content.classList.remove('active');
                chevron.classList.remove('active');
            } else {
                content.classList.add('active');
                chevron.classList.add('active');
            }
        }

        document.getElementById('pdfFiles').addEventListener('change', function(e) {
            selectedFiles = Array.from(e.target.files).filter(f => f.type === 'application/pdf');
            const fileListDiv = document.getElementById('fileList');
            fileListDiv.innerHTML = '';
            if (selectedFiles.length === 0) {
                addLog('请选择有效的 PDF 文件', 'error');
                updateStartButton();
                return;
            }
            selectedFiles.forEach((file, idx) => {
                const item = document.createElement('div');
                item.textContent = `${idx + 1}. ${file.name}`;
                fileListDiv.appendChild(item);
            });
            updateStartButton();
        });

        function updateStartButton() {
            const startButton = document.getElementById('startButton');
            const hasFiles = selectedFiles.length > 0;
            const isRunning = Array.from(tasks.values()).some(t => t.isProcessing);
            startButton.disabled = !hasFiles || isRunning;
            startButton.textContent = isRunning ? '处理中...' : '开始执行';
            startButton.title = '';
        }

        ['apiKey', 'baseUrl', 'model'].forEach(id => {
            document.getElementById(id).addEventListener('input', function() {
                llmConfigModified = true;
                document.getElementById('saveConfigBtn').disabled = false;
            });
        });

        function updateProgress(current, total) {
            // 保留兼容，实际已改为按任务更新
        }

        function addLog(message, type = 'normal') {
            const log = document.getElementById('log');
            const entry = document.createElement('div');
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            if (type === 'error') entry.className = 'error';
            if (type === 'warning') entry.className = 'warning';
            if (type === 'success') entry.className = 'success';
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        function addTaskLog(sessionId, message, type = 'normal') {
            const log = document.getElementById(`log-${sessionId}`);
            if (!log) return;
            const entry = document.createElement('div');
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            if (type === 'error') entry.className = 'error';
            if (type === 'warning') entry.className = 'warning';
            if (type === 'success') entry.className = 'success';
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        function updateTaskProgress(sessionId, current, total) {
            const bar = document.getElementById(`progress-${sessionId}`);
            if (bar) bar.style.width = ((current / total) * 100) + '%';
        }

        function updateTaskStatus(sessionId, text) {
            const status = document.getElementById(`status-${sessionId}`);
            if (status) status.textContent = text;
        }

        function createTaskUI(tempId, filename) {
            const container = document.getElementById('tasksContainer');
            const card = document.createElement('div');
            card.className = 'task-card';
            card.id = `task-${tempId}`;
            card.innerHTML = `
                <div class="task-header">
                    <span class="task-filename">${filename}</span>
                    <div class="task-actions">
                        <button class="remove-file" onclick="removeTask('${tempId}')" title="移除">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                </div>
                <div class="progress-container">
                    <div class="progress-bar"><div class="progress" id="progress-${tempId}"></div></div>
                    <div class="status" id="status-${tempId}">准备上传</div>
                </div>
                <div class="log" id="log-${tempId}"></div>
            `;
            container.prepend(card);
        }

        function updateTaskSessionId(tempId, realId) {
            const card = document.getElementById(`task-${tempId}`);
            if (card) {
                card.id = `task-${realId}`;
                card.querySelector('.progress').id = `progress-${realId}`;
                card.querySelector('.status').id = `status-${realId}`;
                card.querySelector('.log').id = `log-${realId}`;
                card.querySelector('.remove-file').setAttribute('onclick', `removeTask('${realId}')`);
            }
        }

        function removeTask(sessionId) {
            const card = document.getElementById(`task-${sessionId}`);
            if (card) card.remove();
            tasks.delete(sessionId);
            updateStartButton();
        }

        async function uploadAndStartTask(file) {
            const tempId = 'temp_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            createTaskUI(tempId, file.name);
            tasks.set(tempId, { isProcessing: true, file: file });

            const formData = new FormData();
            formData.append('pdf', file);

            try {
                const response = await fetch('/upload', { method: 'POST', body: formData });
                const data = await response.json();
                if (data.status === 'success') {
                    const realSessionId = data.session_id;
                    updateTaskSessionId(tempId, realSessionId);
                    tasks.delete(tempId);
                    tasks.set(realSessionId, { isProcessing: true, file: file });
                    addTaskLog(realSessionId, '文件上传成功，开始处理...', 'success');
                    runScriptForTask(realSessionId, 0, 0);
                } else {
                    addTaskLog(tempId, `上传失败：${data.message}`, 'error');
                    tasks.get(tempId).isProcessing = false;
                    updateStartButton();
                }
            } catch (error) {
                addTaskLog(tempId, `上传失败：${error.message}`, 'error');
                tasks.get(tempId).isProcessing = false;
                updateStartButton();
            }
        }

        async function downloadResult(sessionId) {
            try {
                const response = await fetch(`/download_result/${sessionId}`);
                if (response.ok) {
                    let filename = '处理结果.pdf';
                    const disposition = response.headers.get('Content-Disposition');
                    if (disposition && disposition.indexOf('attachment') !== -1) {
                        const filenameStarMatch = disposition.match(/filename\*=UTF-8''([^;]+)/i);
                        if (filenameStarMatch && filenameStarMatch[1]) {
                            filename = decodeURIComponent(filenameStarMatch[1]);
                        } else {
                            const filenameMatch = disposition.match(/filename="?([^";]+)"?/i);
                            if (filenameMatch && filenameMatch[1]) {
                                filename = decodeURIComponent(filenameMatch[1]);
                            }
                        }
                    }

                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                    addTaskLog(sessionId, '文件下载成功', 'success');
                } else {
                    const data = await response.json();
                    addTaskLog(sessionId, data.message || '下载失败', 'error');
                }
            } catch (error) {
                addTaskLog(sessionId, `下载失败：${error.message}`, 'error');
            }
        }

        async function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function fetchWithTimeout(url, timeout) {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            
            try {
                const response = await fetch(url, {
                    signal: controller.signal
                });
                clearTimeout(id);
                return response;
            } catch (error) {
                clearTimeout(id);
                if (error.name === 'AbortError') {
                    throw new Error('请求超时');
                }
                throw error;
            }
        }

        async function runScriptForTask(sessionId, scriptIndex, retryCount) {
            const task = tasks.get(sessionId);
            if (!task || !task.isProcessing) return;

            updateTaskStatus(sessionId, '正在执行...');
            try {
                const ocrModel = 'qwen';
                const response = await fetchWithTimeout(
                    `/run_script/${sessionId}/${scriptIndex}/${retryCount}?ocr_model=${ocrModel}`,
                    FETCH_TIMEOUT
                );
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();

                if (data.status === 'completed') {
                    task.isProcessing = false;
                    updateTaskStatus(sessionId, '处理完成');
                    updateTaskProgress(sessionId, data.totalScripts || 6, data.totalScripts || 6);
                    addTaskLog(sessionId, '所有脚本执行完成', 'success');
                    updateStartButton();
                    downloadResult(sessionId);
                    return;
                }

                if (data.status === 'success') {
                    updateTaskProgress(sessionId, data.nextIndex, data.totalScripts);
                    updateTaskStatus(sessionId, `正在执行：${data.currentScript} (${data.nextIndex}/${data.totalScripts})`);
                    addTaskLog(sessionId, data.message, 'success');
                    if (data.stdout && data.stdout.trim()) addTaskLog(sessionId, data.stdout.trim(), 'normal');
                    await sleep(SCRIPT_CHECK_INTERVAL);
                    runScriptForTask(sessionId, data.nextIndex, 0);
                } else {
                    handleTaskError(sessionId, data, scriptIndex, retryCount);
                }
            } catch (error) {
                handleTaskError(sessionId, { message: error.message }, scriptIndex, retryCount);
            }
        }

        function handleTaskError(sessionId, data, scriptIndex, retryCount) {
            const task = tasks.get(sessionId);
            if (!task) return;
            if (retryCount < MAX_RETRIES - 1) {
                const nextRetry = retryCount + 1;
                addTaskLog(sessionId, `执行失败，${RETRY_DELAY/1000}秒后进行第${nextRetry}次重试`, 'warning');
                updateTaskStatus(sessionId, `等待重试 (${nextRetry}/${MAX_RETRIES})...`);
                setTimeout(() => runScriptForTask(sessionId, scriptIndex, nextRetry), RETRY_DELAY);
            } else {
                task.isProcessing = false;
                updateTaskStatus(sessionId, `执行失败，已重试${MAX_RETRIES}次`);
                addTaskLog(sessionId, `执行失败：${data.message}`, 'error');
                updateStartButton();
            }
        }

        async function startProcess() {
            if (selectedFiles.length === 0) return;

            document.getElementById('startButton').disabled = true;
            selectedFiles.forEach(file => uploadAndStartTask(file));
        }

        async function testQwenService() {
            const modal = document.getElementById('testModal');
            const resultDiv = document.getElementById('testResult');
            
            resultDiv.innerHTML = '<p style="color: #4b5563;">正在测试模型服务状态...</p>';
            modal.style.display = 'block';
            
            try {
                const configResponse = await fetch('/get_llm_config');
                if (!configResponse.ok) {
                    throw new Error('获取 LLM 配置失败');
                }
                
                const configData = await configResponse.json();
                if (configData.status !== 'success') {
                    throw new Error(configData.message || '获取 LLM 配置失败');
                }
                
                const config = configData.config;
                
                const response = await fetch('/test_llm_service', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        api_key: config.api_key,
                        base_url: config.base_url,
                        model: config.model
                    })
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    resultDiv.innerHTML = `
                        <p style="color: #10b981; font-weight: 500;">✓ ${data.message}</p>
                        <p style="background: #f3f4f6; padding: 10px; border-radius: 6px; font-family: monospace;">响应内容：${data.response}</p>
                        <p style="color: #6b7280; font-size: 13px;">使用的模型：${config.model}</p>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <p style="color: #ef4444; font-weight: 500;">✗ 测试失败</p>
                        <p>错误信息：${data.message}</p>
                        <p>错误类型：${data.error_code}</p>
                        <p style="color: #6b7280; font-size: 13px;">尝试使用的模型：${config.model}</p>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <p style="color: #ef4444; font-weight: 500;">✗ 请求失败</p>
                    <p>错误信息：${error.message}</p>
                `;
            }
        }
        
        function closeTestModal() {
            document.getElementById('testModal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('testModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }

        async function loadLLMConfig() {
            try {
                const response = await fetch('/get_llm_config');
                if (!response.ok) {
                    throw new Error('获取 LLM 配置失败');
                }
                
                const data = await response.json();
                if (data.status === 'success') {
                    document.getElementById('apiKey').value = data.config.api_key;
                    document.getElementById('baseUrl').value = data.config.base_url;
                    document.getElementById('model').value = data.config.model;
                    
                    llmConfigModified = false;
                    document.getElementById('saveConfigBtn').disabled = true;
                } else {
                    throw new Error(data.message || '获取 LLM 配置失败');
                }
            } catch (error) {
                console.error('加载 LLM 配置失败:', error);
                addLog('加载 LLM 配置失败：' + error.message, 'error');
            }
        }

        async function saveLLMConfig() {
            try {
                const config = {
                    api_key: document.getElementById('apiKey').value,
                    base_url: document.getElementById('baseUrl').value,
                    model: document.getElementById('model').value
                };

                const response = await fetch('/save_llm_config', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(config)
                });

                if (!response.ok) {
                    throw new Error('保存 LLM 配置失败');
                }

                const data = await response.json();
                if (data.status !== 'success') {
                    throw new Error(data.message || '保存 LLM 配置失败');
                }

                llmConfigModified = false;
                document.getElementById('saveConfigBtn').disabled = true;
                addLog('LLM 配置保存成功', 'success');
            } catch (error) {
                console.error('保存 LLM 配置失败:', error);
                addLog('保存 LLM 配置失败：' + error.message, 'error');
            }
        }
    </script>
