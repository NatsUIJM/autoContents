<!DOCTYPE html>
<html>
<head>
    <title>autoContents 目录生成工具</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            background-color: #f3f4f6;
            color: #1f2937;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 15px;
        }
        .header h2 {
            margin: 0;
            color: #111827;
        }
        /* 输入框通用样式 */
        .form-select, input[type="number"], input[type="text"], .prompt-input {
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            width: 100%;
            box-sizing: border-box;
            font-size: 14px;
            transition: all 0.2s ease;
            background-color: #fff;
        }
        .form-select:focus, input[type="number"]:focus, input[type="text"]:focus, .prompt-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .prompt-input {
            min-height: 100px;
            resize: vertical;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }
        /* 按钮通用样式 */
        button {
            transition: all 0.2s ease;
        }
        .test-btn {
            background-color: #6366f1;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        .test-btn:hover {
            background-color: #4f46e5;
            transform: translateY(-1px);
        }
        .file-input-container {
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .file-input-container button {
            background-color: #3b82f6;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }
        .file-input-container button:hover {
            background-color: #2563eb;
            transform: translateY(-1px);
        }
        .file-name {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #4b5563;
        }
        .remove-file {
            color: #9ca3af;
            cursor: pointer;
            border: none;
            background: none;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .remove-file:hover {
            color: #ef4444;
            background-color: #fee2e2;
            border-radius: 4px;
        }
        .progress-container {
            margin: 25px 0;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress {
            width: 0%;
            height: 100%;
            background-color: #10b981;
            transition: width 0.4s ease;
        }
        .status {
            margin: 10px 0;
            text-align: center;
            color: #6b7280;
            font-size: 14px;
        }
        .log {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 13px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            line-height: 1.6;
        }
        .error { color: #ef4444; }
        .warning { color: #f59e0b; }
        .success { color: #10b981; }
        
        button#startButton {
            width: 100%;
            background-color: #10b981;
            color: white;
            padding: 14px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-top: 10px;
        }
        button#startButton:hover:not(:disabled) {
            background-color: #059669;
            transform: translateY(-1px);
        }
        button#startButton:disabled {
            background-color: #d1d5db;
            cursor: not-allowed;
        }
        .hidden { display: none; }
        
        /* 折叠面板样式 */
        .collapsible-wrapper {
            margin-top: 20px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background-color: #f9fafb;
            overflow: hidden;
        }
        .collapsible-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            cursor: pointer;
            user-select: none;
            background-color: #f9fafb;
            transition: background-color 0.2s;
        }
        .collapsible-header:hover {
            background-color: #f3f4f6;
        }
        .collapsible-header h3 {
            margin: 0;
            font-size: 15px;
            color: #374151;
            font-weight: 600;
        }
        .collapsible-content {
            display: none;
            padding: 20px;
            background-color: #ffffff;
            border-top: 1px solid #e5e7eb;
        }
        .collapsible-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .chevron {
            transition: transform 0.3s ease;
            color: #6b7280;
        }
        .chevron.active {
            transform: rotate(180deg);
        }
        .llm-config-section, .prompt-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .save-btn {
            align-self: flex-start;
            background-color: #6366f1;
            color: white;
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            margin-top: 5px;
        }
        .save-btn:hover:not(:disabled) {
            background-color: #4f46e5;
        }
        .save-btn:disabled {
            background-color: #d1d5db;
            cursor: not-allowed;
        }

        /* 模态框与赞助 */
        .sponsor-container {
            max-width: 800px;
            margin: 30px auto;
            text-align: center;
        }
        .sponsor-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            background-color: #ffffff;
            border: 1px solid #d1d5db;
            border-radius: 20px;
            color: #4b5563;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .sponsor-button:hover {
            background-color: #f9fafb;
            border-color: #9ca3af;
        }
        .sponsor-content {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .sponsor-qr {
            max-width: 300px;
            height: auto;
            border-radius: 8px;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(2px);
        }
        .modal-content {
            background-color: #ffffff;
            margin: 10% auto;
            padding: 25px;
            border: none;
            width: 90%;
            max-width: 500px;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .close {
            color: #9ca3af;
            float: right;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            line-height: 1;
        }
        .close:hover { color: #374151; }
        
        /* 底部链接 */
        .footer-links {
            text-align: center;
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .footer-links a {
            color: #4f46e5;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }
        .footer-links a:hover {
            color: #312e81;
            text-decoration: underline;
        }
        .footer-text {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>autoContents 目录生成工具</h2>
            <button class="test-btn" onclick="testQwenService()">模型服务测试</button>
        </div>

        <div class="file-input-container">
            <input type="file" id="pdfFile" accept=".pdf" class="hidden">
            <button onclick="document.getElementById('pdfFile').click()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                选择 PDF 文件
            </button>
            <div id="fileName" class="file-name"></div>
        </div>

        <!-- 已删除：目录起始页、结束页和正文偏移量的输入框 -->

        <button id="startButton" onclick="startProcess()" disabled>开始执行</button>
        
        <div class="progress-container">
            <div class="progress-bar">
                <div id="progress" class="progress"></div>
            </div>
            <div id="status" class="status">准备就绪</div>
        </div>
        
        <div id="log" class="log"></div>
        
        <!-- LLM 配置折叠面板 -->
        <div class="collapsible-wrapper">
            <div class="collapsible-header" onclick="toggleCollapsible('llmContent', 'llmChevron')">
                <h3>LLM 配置管理</h3>
                <svg id="llmChevron" class="chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </div>
            <div id="llmContent" class="collapsible-content">
                <div class="llm-config-section">
                    <div class="input-group">
                        <label for="apiKey">API 密钥（若为环境变量请使用$符号包裹，否则直接输入 KEY 即可）</label>
                        <input type="text" id="apiKey" class="llm-config-input" placeholder="请输入 API 密钥...">
                    </div>
                    <div class="input-group">
                        <label for="baseUrl">Base URL（需以 v1 结尾）</label>
                        <input type="text" id="baseUrl" class="llm-config-input" placeholder="请输入 Base URL...">
                    </div>
                    <div class="input-group">
                        <label for="model">模型名称</label>
                        <input type="text" id="model" class="llm-config-input" placeholder="请输入模型名称...">
                    </div>
                    <button id="saveConfigBtn" class="save-btn" onclick="saveLLMConfig()" disabled>保存 LLM 配置</button>
                </div>
            </div>
        </div>
        
        <!-- 提示词管理折叠面板 -->
        <div class="collapsible-wrapper">
            <div class="collapsible-header" onclick="toggleCollapsible('promptContent', 'promptChevron')">
                <h3>提示词管理</h3>
                <svg id="promptChevron" class="chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </div>
            <div id="promptContent" class="collapsible-content">
                <div class="prompt-section">
                    <div class="input-group">
                        <label for="extractPrompt">目录提取提示词</label>
                        <textarea id="extractPrompt" class="prompt-input" placeholder="请输入目录提取提示词..."></textarea>
                    </div>
                    <div class="input-group">
                        <label for="adjusterRoutePrompt">层级识别路由提示词</label>
                        <textarea id="adjusterRoutePrompt" class="prompt-input" placeholder="请输入层级识别路由提示词..."></textarea>
                    </div>
                    <div class="input-group">
                        <label for="adjusterPrompt">层级识别提示词</label>
                        <textarea id="adjusterPrompt" class="prompt-input" placeholder="请输入层级识别提示词..."></textarea>
                    </div>
                    <button id="savePromptsBtn" class="save-btn" style="background-color: #10b981;" onclick="savePrompts()" disabled>保存提示词</button>
                </div>
            </div>
        </div>
    </div>

    <div id="testModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeTestModal()">&times;</span>
            <h3 style="margin-top: 0;">服务状态测试结果</h3>
            <div id="testResult" style="margin-top: 15px; line-height: 1.5;"></div>
        </div>
    </div>

    <div class="sponsor-container">
        <button id="sponsorButton" class="sponsor-button" onclick="toggleSponsor()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2z"/>
            </svg>
            赞助支持
        </button>
        <div id="sponsorContent" class="sponsor-content">
            <img src="/static/qrcode.jpg" alt="赞助二维码" class="sponsor-qr">
        </div>
    </div>

    <div class="footer-links">
        <a href="https://github.com/NatsUIJM/autoContents" target="_blank">GitHub</a>
        <a href="https://bbs.marginnote.com.cn/t/topic/59344/2" target="_blank">MarginNote</a>
        <a href="https://www.bilibili.com/video/BV14wKGeQEvr/" target="_blank">Bilibili</a>
        <a href="https://www.zhihu.com/question/392666875/answer/100357892412" target="_blank">知乎</a>
    </div>
    <div class="footer-text">
        本项目完全开源免费，任何个人或组织不得将此工具进行商业销售。
    </div>

    <script>
        let isProcessing = false;
        let selectedFile = null;
        const MAX_RETRIES = 3;
        const RETRY_DELAY = 1000;
        const FETCH_TIMEOUT = 360000;
        const SCRIPT_CHECK_INTERVAL = 1000;
        let currentSessionId = null;
        let promptsModified = false;
        let llmConfigModified = false;

        window.addEventListener('DOMContentLoaded', function() {
            loadPrompts();
            loadLLMConfig();
        });

        // 折叠面板控制逻辑
        function toggleCollapsible(contentId, chevronId) {
            const content = document.getElementById(contentId);
            const chevron = document.getElementById(chevronId);
            
            if (content.classList.contains('active')) {
                content.classList.remove('active');
                chevron.classList.remove('active');
            } else {
                content.classList.add('active');
                chevron.classList.add('active');
            }
        }

        document.getElementById('pdfFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file && file.type === 'application/pdf') {
                selectedFile = file;
                const fileNameDiv = document.getElementById('fileName');
                fileNameDiv.innerHTML = `
                    <span>${file.name}</span>
                    <button class="remove-file" onclick="removeFile()" title="移除文件">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                `;
                updateStartButton();
            } else {
                addLog('请选择 PDF 文件', 'error');
            }
        });

        function removeFile() {
            selectedFile = null;
            document.getElementById('pdfFile').value = '';
            document.getElementById('fileName').innerHTML = '';
            updateStartButton();
        }

        // 已删除：autoOffset 相关的 change 事件监听

        function updateStartButton() {
            const startButton = document.getElementById('startButton');
            // 仅需检查是否有文件选中，不再检查页码输入
            startButton.disabled = !selectedFile || isProcessing;
        }

        // 已删除：tocStart, tocEnd, contentStart 的 input 事件监听

        ['extractPrompt', 'adjusterRoutePrompt', 'adjusterPrompt'].forEach(id => {
            document.getElementById(id).addEventListener('input', function() {
                promptsModified = true;
                document.getElementById('savePromptsBtn').disabled = false;
            });
        });

        ['apiKey', 'baseUrl', 'model'].forEach(id => {
            document.getElementById(id).addEventListener('input', function() {
                llmConfigModified = true;
                document.getElementById('saveConfigBtn').disabled = false;
            });
        });

        function updateProgress(current, total) {
            const percentage = (current / total) * 100;
            document.getElementById('progress').style.width = percentage + '%';
        }

        function addLog(message, type = 'normal') {
            const log = document.getElementById('log');
            const entry = document.createElement('div');
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            if (type === 'error') entry.className = 'error';
            if (type === 'warning') entry.className = 'warning';
            if (type === 'success') entry.className = 'success';
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        async function uploadFiles() {
            const formData = new FormData();
            formData.append('pdf', selectedFile);
            // 已删除：tocStart, tocEnd, autoOffset, contentStart 的添加逻辑

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                if (data.status === 'success') {
                    currentSessionId = data.session_id;
                    addLog('文件上传成功', 'success');
                    return true;
                } else {
                    addLog(data.message, 'error');
                    return false;
                }
            } catch (error) {
                addLog(`上传失败：${error.message}`, 'error');
                return false;
            }
        }

        async function downloadResult() {
            try {
                const response = await fetch(`/download_result/${currentSessionId}`);
                if (response.ok) {
                    const showReminder = response.headers.get('X-Show-Reminder');
                    const showNoReminderOption = response.headers.get('X-No-Reminder-Option');
                    
                    let filename = '处理结果.pdf';
                    const disposition = response.headers.get('Content-Disposition');
                    if (disposition && disposition.indexOf('attachment') !== -1) {
                        const filenameStarMatch = disposition.match(/filename\*=UTF-8''([^;]+)/i);
                        if (filenameStarMatch && filenameStarMatch[1]) {
                            filename = decodeURIComponent(filenameStarMatch[1]);
                        } else {
                            const filenameMatch = disposition.match(/filename="?([^";]+)"?/i);
                            if (filenameMatch && filenameMatch[1]) {
                                filename = decodeURIComponent(filenameMatch[1]);
                            }
                        }
                    }
                    
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                    addLog('文件下载成功', 'success');
                    
                    if (showReminder === 'true') {
                        showReminderModal(showNoReminderOption === 'true');
                    }
                } else {
                    const data = await response.json();
                    addLog(data.message, 'error');
                }
            } catch (error) {
                addLog(`下载失败：${error.message}`, 'error');
            }
        }

        function showReminderModal(showNoReminderOption) {
            let reminderModal = document.getElementById('reminderModal');
            if (!reminderModal) {
                reminderModal = document.createElement('div');
                reminderModal.id = 'reminderModal';
                reminderModal.className = 'modal';
                reminderModal.innerHTML = `
                    <div class="modal-content">
                        <span class="close" onclick="closeReminderModal()">&times;</span>
                        <h3 style="margin-top: 0;">温馨提示</h3>
                        <p>如果你认为这个程序有所帮助，希望可以打赏支持，谢谢！</p>
                        <p>遇到任何问题，请向 uijm2004@outlook.com 反馈。</p>
                        <div id="noReminderOption" style="margin-top: 20px; display: none;">
                            <button onclick="setNoReminder()" style="background-color: #f3f4f6; border: 1px solid #d1d5db; padding: 8px 16px; border-radius: 6px; cursor: pointer; color: #4b5563;">
                                不再弹出
                            </button>
                        </div>
                    </div>
                `;
                document.body.appendChild(reminderModal);
            }
            
            const noReminderOption = document.getElementById('noReminderOption');
            if (noReminderOption) {
                noReminderOption.style.display = showNoReminderOption ? 'block' : 'none';
            }
            
            reminderModal.style.display = 'block';
        }

        function setNoReminder() {
            fetch('/set_no_reminder', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    console.log('已设置不再提醒');
                } else {
                    console.error('设置失败:', data.message);
                }
                closeReminderModal();
            })
            .catch(error => {
                console.error('请求失败:', error);
                closeReminderModal();
            });
        }

        function closeReminderModal() {
            const reminderModal = document.getElementById('reminderModal');
            if (reminderModal) {
                reminderModal.style.display = 'none';
            }
        }

        async function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function fetchWithTimeout(url, timeout) {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            
            try {
                const response = await fetch(url, {
                    signal: controller.signal
                });
                clearTimeout(id);
                return response;
            } catch (error) {
                clearTimeout(id);
                if (error.name === 'AbortError') {
                    throw new Error('请求超时');
                }
                throw error;
            }
        }

        async function runScript(scriptIndex, retryCount = 0) {
            if (!isProcessing) return;

            document.getElementById('status').textContent = '正在执行...';
            
            try {
                // 强制使用 qwen 模型
                const ocrModel = 'qwen';
                const response = await fetchWithTimeout(
                    `/run_script/${currentSessionId}/${scriptIndex}/${retryCount}?ocr_model=${ocrModel}`,
                    FETCH_TIMEOUT
                );

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                
                if (data.status === 'completed') {
                    isProcessing = false;
                    document.getElementById('status').textContent = '所有脚本执行完成';
                    document.getElementById('startButton').disabled = false;
                    addLog('所有脚本执行完成', 'success');
                    await downloadResult();
                    return;
                }
                
                if (data.status === 'success') {
                    updateProgress(data.nextIndex, data.totalScripts);
                    document.getElementById('status').textContent = 
                        `正在执行：${data.currentScript} (${data.nextIndex}/${data.totalScripts})`;
                    addLog(data.message, 'success');
                    await sleep(SCRIPT_CHECK_INTERVAL);
                    runScript(data.nextIndex, 0);
                } else {
                    handleError(data, scriptIndex, retryCount);
                }
            } catch (error) {
                handleError({ message: error.message }, scriptIndex, retryCount);
            }
        }

        function handleError(data, scriptIndex, retryCount) {
            if (retryCount < MAX_RETRIES - 1) {
                const nextRetryCount = retryCount + 1;
                addLog(`执行失败，${RETRY_DELAY/1000}秒后进行第${nextRetryCount}次重试`, 'warning');
                document.getElementById('status').textContent = `等待重试 (${nextRetryCount}/${MAX_RETRIES})...`;
                setTimeout(() => runScript(scriptIndex, nextRetryCount), RETRY_DELAY);
            } else {
                isProcessing = false;
                document.getElementById('status').textContent = `执行失败，已重试${MAX_RETRIES}次`;
                document.getElementById('startButton').disabled = false;
                addLog(`执行失败，已达到最大重试次数：${data.message}`, 'error');
            }
        }

        async function startProcess() {
            if (isProcessing) return;
            
            const uploadSuccess = await uploadFiles();
            if (!uploadSuccess) return;

            isProcessing = true;
            document.getElementById('startButton').disabled = true;
            document.getElementById('progress').style.width = '0%';
            document.getElementById('log').innerHTML = '';
            addLog('开始执行脚本序列');
            runScript(0, 0);
        }

        function toggleSponsor() {
            const content = document.getElementById('sponsorContent');
            const currentDisplay = window.getComputedStyle(content).display;
            content.style.display = currentDisplay === 'none' ? 'block' : 'none';
        }

        async function testQwenService() {
            const modal = document.getElementById('testModal');
            const resultDiv = document.getElementById('testResult');
            
            resultDiv.innerHTML = '<p style="color: #4b5563;">正在测试模型服务状态...</p>';
            modal.style.display = 'block';
            
            try {
                const configResponse = await fetch('/get_llm_config');
                if (!configResponse.ok) {
                    throw new Error('获取 LLM 配置失败');
                }
                
                const configData = await configResponse.json();
                if (configData.status !== 'success') {
                    throw new Error(configData.message || '获取 LLM 配置失败');
                }
                
                const config = configData.config;
                
                const response = await fetch('/test_llm_service', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        api_key: config.api_key,
                        base_url: config.base_url,
                        model: config.model
                    })
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    resultDiv.innerHTML = `
                        <p style="color: #10b981; font-weight: 500;">✓ ${data.message}</p>
                        <p style="background: #f3f4f6; padding: 10px; border-radius: 6px; font-family: monospace;">响应内容：${data.response}</p>
                        <p style="color: #6b7280; font-size: 13px;">使用的模型：${config.model}</p>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <p style="color: #ef4444; font-weight: 500;">✗ 测试失败</p>
                        <p>错误信息：${data.message}</p>
                        <p>错误类型：${data.error_code}</p>
                        <p style="color: #6b7280; font-size: 13px;">尝试使用的模型：${config.model}</p>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <p style="color: #ef4444; font-weight: 500;">✗ 请求失败</p>
                    <p>错误信息：${error.message}</p>
                `;
            }
        }
        
        function closeTestModal() {
            document.getElementById('testModal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('testModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }

        async function loadLLMConfig() {
            try {
                const response = await fetch('/get_llm_config');
                if (!response.ok) {
                    throw new Error('获取 LLM 配置失败');
                }
                
                const data = await response.json();
                if (data.status === 'success') {
                    document.getElementById('apiKey').value = data.config.api_key;
                    document.getElementById('baseUrl').value = data.config.base_url;
                    document.getElementById('model').value = data.config.model;
                    
                    llmConfigModified = false;
                    document.getElementById('saveConfigBtn').disabled = true;
                } else {
                    throw new Error(data.message || '获取 LLM 配置失败');
                }
            } catch (error) {
                console.error('加载 LLM 配置失败:', error);
                addLog('加载 LLM 配置失败：' + error.message, 'error');
            }
        }

        async function saveLLMConfig() {
            try {
                const config = {
                    api_key: document.getElementById('apiKey').value,
                    base_url: document.getElementById('baseUrl').value,
                    model: document.getElementById('model').value
                };

                const response = await fetch('/save_llm_config', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(config)
                });

                if (!response.ok) {
                    throw new Error('保存 LLM 配置失败');
                }

                const data = await response.json();
                if (data.status !== 'success') {
                    throw new Error(data.message || '保存 LLM 配置失败');
                }

                llmConfigModified = false;
                document.getElementById('saveConfigBtn').disabled = true;
                addLog('LLM 配置保存成功', 'success');
            } catch (error) {
                console.error('保存 LLM 配置失败:', error);
                addLog('保存 LLM 配置失败：' + error.message, 'error');
            }
        }

        async function loadPrompts() {
            try {
                const extractResponse = await fetch('/static/extract_prompt.md');
                if (extractResponse.ok) {
                    const extractContent = await extractResponse.text();
                    document.getElementById('extractPrompt').value = extractContent;
                }

                const routeResponse = await fetch('/static/adjuster_prompt_route.md');
                if (routeResponse.ok) {
                    const routeContent = await routeResponse.text();
                    document.getElementById('adjusterRoutePrompt').value = routeContent;
                }

                const adjusterResponse = await fetch('/static/adjuster_prompt.md');
                if (adjusterResponse.ok) {
                    const adjusterContent = await adjusterResponse.text();
                    document.getElementById('adjusterPrompt').value = adjusterContent;
                }

                promptsModified = false;
                document.getElementById('savePromptsBtn').disabled = true;
            } catch (error) {
                console.error('加载提示词失败:', error);
                addLog('加载提示词失败：' + error.message, 'error');
            }
        }

        async function savePrompts() {
            try {
                const extractContent = document.getElementById('extractPrompt').value;
                const routeContent = document.getElementById('adjusterRoutePrompt').value;
                const adjusterContent = document.getElementById('adjusterPrompt').value;

                const extractResponse = await fetch('/save_prompt/extract_prompt.md', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain'
                    },
                    body: extractContent
                });

                if (!extractResponse.ok) {
                    throw new Error('保存目录提取提示词失败');
                }

                const routeResponse = await fetch('/save_prompt/adjuster_prompt_route.md', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain'
                    },
                    body: routeContent
                });

                if (!routeResponse.ok) {
                    throw new Error('保存层级识别路由提示词失败');
                }

                const adjusterResponse = await fetch('/save_prompt/adjuster_prompt.md', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain'
                    },
                    body: adjusterContent
                });

                if (!adjusterResponse.ok) {
                    throw new Error('保存层级识别提示词失败');
                }

                promptsModified = false;
                document.getElementById('savePromptsBtn').disabled = true;
                addLog('提示词保存成功', 'success');
            } catch (error) {
                console.error('保存提示词失败:', error);
                addLog('保存提示词失败：' + error.message, 'error');
            }
        }
    </script>
