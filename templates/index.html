<!DOCTYPE html>
<html>
<head>
    <title>autoContents 目录生成工具</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            background-color: #f3f4f6;
            color: #1f2937;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 15px;
        }
        .header h2 {
            margin: 0;
            color: #111827;
        }
        .form-select, input[type="number"], input[type="text"], .prompt-input {
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            width: 100%;
            box-sizing: border-box;
            font-size: 14px;
            transition: all 0.2s ease;
            background-color: #fff;
        }
        .form-select:focus, input[type="number"]:focus, input[type="text"]:focus, .prompt-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .prompt-input {
            min-height: 100px;
            resize: vertical;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }
        button {
            transition: all 0.2s ease;
        }
        .test-btn {
            background-color: #6366f1;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        .test-btn:hover {
            background-color: #4f46e5;
            transform: translateY(-1px);
        }
        .file-input-container {
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .file-input-container button {
            background-color: #3b82f6;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }
        .file-input-container button:hover {
            background-color: #2563eb;
            transform: translateY(-1px);
        }
        .file-name {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #4b5563;
        }
        .remove-file {
            color: #9ca3af;
            cursor: pointer;
            border: none;
            background: none;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .remove-file:hover {
            color: #ef4444;
            background-color: #fee2e2;
            border-radius: 4px;
        }
        .progress-container {
            margin: 25px 0;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress {
            width: 0%;
            height: 100%;
            background-color: #10b981;
            transition: width 0.4s ease;
        }
        .status {
            margin: 10px 0;
            text-align: center;
            color: #6b7280;
            font-size: 14px;
        }
        .log {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 13px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            line-height: 1.6;
        }
        .error { color: #ef4444; }
        .warning { color: #f59e0b; }
        .success { color: #10b981; }
        
        button#startButton {
            width: 100%;
            background-color: #10b981;
            color: white;
            padding: 14px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-top: 10px;
        }
        button#startButton:hover:not(:disabled) {
            background-color: #059669;
            transform: translateY(-1px);
        }
        button#startButton:disabled {
            background-color: #d1d5db;
            cursor: not-allowed;
        }
        .hidden { display: none; }
        
        .collapsible-wrapper {
            margin-top: 20px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background-color: #f9fafb;
            overflow: hidden;
        }
        .collapsible-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            cursor: pointer;
            user-select: none;
            background-color: #f9fafb;
            transition: background-color 0.2s;
        }
        .collapsible-header:hover {
            background-color: #f3f4f6;
        }
        .collapsible-header h3 {
            margin: 0;
            font-size: 15px;
            color: #374151;
            font-weight: 600;
        }
        .collapsible-content {
            display: none;
            padding: 20px;
            background-color: #ffffff;
            border-top: 1px solid #e5e7eb;
        }
        .collapsible-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .chevron {
            transition: transform 0.3s ease;
            color: #6b7280;
        }
        .chevron.active {
            transform: rotate(180deg);
        }
        .llm-config-section, .prompt-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .save-btn {
            align-self: flex-start;
            background-color: #6366f1;
            color: white;
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            margin-top: 5px;
        }
        .save-btn:hover:not(:disabled) {
            background-color: #4f46e5;
        }
        .save-btn:disabled {
            background-color: #d1d5db;
            cursor: not-allowed;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(2px);
        }
        .modal-content {
            background-color: #ffffff;
            margin: 10% auto;
            padding: 25px;
            border: none;
            width: 90%;
            max-width: 500px;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .close {
            color: #9ca3af;
            float: right;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            line-height: 1;
        }
        .close:hover { color: #374151; }
        
        .footer-links {
            text-align: center;
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .footer-links a {
            color: #4f46e5;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }
        .footer-links a:hover {
            color: #312e81;
            text-decoration: underline;
        }
        .footer-text {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 30px;
        }

        /* 鉴权区域样式 */
        .auth-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .auth-btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .auth-btn:disabled {
            background-color: #d1d5db;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .trial-btn {
            background-color: #f59e0b;
            color: white;
        }
        .trial-btn:hover:not(:disabled) {
            background-color: #d97706;
        }
        .activate-btn {
            background-color: #10b981;
            color: white;
        }
        .activate-btn:hover:not(:disabled) {
            background-color: #059669;
        }
        .deactivate-btn {
            background-color: #ef4444;
            color: white;
        }
        .deactivate-btn:hover:not(:disabled) {
            background-color: #dc2626;
        }
        .check-expire-btn {
            background-color: #3b82f6;
            color: white;
        }
        .check-expire-btn:hover:not(:disabled) {
            background-color: #2563eb;
        }
        .auth-input {
            flex: 1;
            min-width: 200px;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
        }
        .auth-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .auth-status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            min-height: 20px;
        }
        .auth-status.trial {
            background-color: #fef3c7;
            color: #92400e;
        }
        .auth-status.activated {
            background-color: #d1fae5;
            color: #065f46;
        }
        .auth-status.none {
            background-color: #f3f4f6;
            color: #6b7280;
        }
        /* 到期时间状态样式复用 auth-status 或独立定义 */
        .auth-status.expired {
            background-color: #fee2e2;
            color: #991b1b;
        }
        .auth-status.expiring-soon {
            background-color: #fef3c7;
            color: #92400e;
        }
        .auth-status.valid {
            background-color: #d1fae5;
            color: #065f46;
        }

        .machine-code-display {
            margin-top: 10px;
            font-size: 12px;
            color: #6b7280;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>autoContents 目录生成工具</h2>
            <button class="test-btn" onclick="testQwenService()">模型服务测试</button>
        </div>

        <div class="file-input-container">
            <input type="file" id="pdfFile" accept=".pdf" class="hidden">
            <button onclick="document.getElementById('pdfFile').click()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                选择 PDF 文件
            </button>
            <div id="fileName" class="file-name"></div>
        </div>

        <button id="startButton" onclick="startProcess()" disabled>开始执行</button>
        
        <div class="progress-container">
            <div class="progress-bar">
                <div id="progress" class="progress"></div>
            </div>
            <div id="status" class="status">准备就绪</div>
        </div>
        
        <div id="log" class="log"></div>
        
        <div class="collapsible-wrapper">
            <div class="collapsible-header" onclick="toggleCollapsible('llmContent', 'llmChevron')">
                <h3>模型配置管理</h3>
                <svg id="llmChevron" class="chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </div>
            <div id="llmContent" class="collapsible-content">
                <div class="llm-config-section">
                    <div class="input-group">
                        <label for="apiKey">API 密钥（若为环境变量请使用$符号包裹，否则直接输入 KEY 即可）</label>
                        <input type="text" id="apiKey" class="llm-config-input" placeholder="请输入 API 密钥...">
                    </div>
                    <div class="input-group">
                        <label for="baseUrl">Base URL（需以 v1 结尾）</label>
                        <input type="text" id="baseUrl" class="llm-config-input" placeholder="请输入 Base URL...">
                    </div>
                    <div class="input-group">
                        <label for="model">模型名称</label>
                        <input type="text" id="model" class="llm-config-input" placeholder="请输入模型名称...">
                    </div>
                    <button id="saveConfigBtn" class="save-btn" onclick="saveLLMConfig()" disabled>保存 LLM 配置</button>
                </div>
            </div>
        </div>
        
        <div class="collapsible-wrapper">
            <div class="collapsible-header" onclick="toggleCollapsible('sysLogContent', 'sysLogChevron')">
                <h3>系统日志</h3>
                <svg id="sysLogChevron" class="chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </div>
            <div id="sysLogContent" class="collapsible-content">
                <div id="sysLogContainer" class="log" style="background-color: #1e1e1e; color: #d4d4d4; max-height: 300px; margin-top: 0;"></div>
            </div>
        </div>

        <!-- 鉴权区域 - 放在最下方，默认折叠 -->
        <div class="collapsible-wrapper">
            <div class="collapsible-header" onclick="toggleCollapsible('authContent', 'authChevron')">
                <h3>软件授权</h3>
                <svg id="authChevron" class="chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </div>
            <div id="authContent" class="collapsible-content">
                <div class="llm-config-section">
                    <div class="auth-controls">
                        <button id="trialBtn" class="auth-btn trial-btn" onclick="startTrial()">开始试用</button>
                        <input type="text" id="activationInput" class="auth-input" placeholder="输入 32 位激活码" maxlength="32">
                        <button id="activateBtn" class="auth-btn activate-btn" onclick="activate()" disabled>激活</button>
                        <button id="deactivateBtn" class="auth-btn deactivate-btn" onclick="deactivate()" disabled>反激活</button>
                        <button id="checkExpireBtn" class="auth-btn check-expire-btn" onclick="checkExpireDate()" disabled>查询到期时间</button>
                    </div>
                    <div id="authStatus" class="auth-status none">未授权</div>
                    <div id="machineCodeDisplay" class="machine-code-display"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="testModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeTestModal()">&times;</span>
            <h3 style="margin-top: 0;">服务状态测试结果</h3>
            <div id="testResult" style="margin-top: 15px; line-height: 1.5;"></div>
        </div>
    </div>

    <div class="footer-links">
        <a href="https://github.com/NatsUIJM/autoContents" target="_blank">GitHub</a>
        <a href="https://bbs.marginnote.com.cn/t/topic/59344/2" target="_blank">MarginNote</a>
        <a href="https://www.bilibili.com/video/BV14wKGeQEvr/" target="_blank">Bilibili</a>
        <a href="https://www.zhihu.com/question/392666875/answer/100357892412" target="_blank">知乎</a>
    </div>

    <script>
        let isProcessing = false;
        let selectedFile = null;
        const MAX_RETRIES = 3;
        const RETRY_DELAY = 1000;
        const FETCH_TIMEOUT = 360000;
        const SCRIPT_CHECK_INTERVAL = 1000;
        let currentSessionId = null;
        let llmConfigModified = false;
        let logEventSource = null;
        let currentMachineCode = null;
        let authStatus = {
            hasKey: false,
            isTrial: false,
            isActivated: false
        };
        let expireDateInfo = null;

        function initSysLogStream() {
            if (logEventSource) {
                logEventSource.close();
            }
            logEventSource = new EventSource('/stream_log');
            const sysLogContainer = document.getElementById('sysLogContainer');
            
            logEventSource.onmessage = function(event) {
                const data = JSON.parse(event.data);
                const div = document.createElement('div');
                div.textContent = data.text;
                div.style.whiteSpace = 'pre-wrap';
                div.style.wordBreak = 'break-all';
                
                sysLogContainer.appendChild(div);
                
                while (sysLogContainer.childNodes.length > 500) {
                    sysLogContainer.removeChild(sysLogContainer.firstChild);
                }
                
                sysLogContainer.scrollTop = sysLogContainer.scrollHeight;
            };
            
            logEventSource.onerror = function(err) {
                console.error("日志流连接断开，浏览器将自动尝试重连...");
            };
        }

        window.addEventListener('DOMContentLoaded', function() {
            loadLLMConfig();
            initSysLogStream();
            loadAuthStatus();
            loadMachineCode();
        });

        // ==================== 鉴权相关函数 ====================

        async function loadAuthStatus() {
            try {
                const response = await fetch('/api/auth_status');
                const data = await response.json();
                
                if (data.status === 'success') {
                    authStatus = {
                        hasKey: data.has_key,
                        isTrial: data.is_trial,
                        isActivated: data.is_activated
                    };
                    updateAuthUI();
                    
                    // 初始化时不自动加载到期时间，仅显示基础状态
                    // if (authStatus.hasKey) {
                    //     await loadExpireDate();
                    // }
                }
            } catch (error) {
                console.error('加载授权状态失败:', error);
            }
        }

        async function loadMachineCode() {
            try {
                const response = await fetch('/api/machine_code');
                const data = await response.json();
                
                if (data.status === 'success') {
                    currentMachineCode = data.machine_code;
                    document.getElementById('machineCodeDisplay').textContent = 
                        `机器码：${currentMachineCode}`;
                    updateCheckExpireBtn();
                }
            } catch (error) {
                console.error('加载机器码失败:', error);
            }
        }
        async function loadExpireDate() {
            try {
                let activationCode = '';
                
                // 新逻辑：优先尝试获取前端输入框的值
                const inputVal = document.getElementById('activationInput').value.trim();
                
                if (inputVal) {
                    // 如果前端输入框有值，直接使用（无论是 Trail 还是 32 位码）
                    activationCode = inputVal;
                } else if (authStatus.isTrial) {
                    // 如果前端没值，但是是试用状态，默认查 Trail
                    activationCode = 'Trail';
                } else if (authStatus.isActivated) {
                    // 如果是激活状态但前端没值（理论上不应该发生，除非用户清空了输入框），
                    // 此时不传 activation_code 参数，让后端去读本地文件
                    activationCode = ''; 
                }
                
                // 如果最终还是没有激活码（既没输入也不是试用），则无法查询
                if (!activationCode && !authStatus.isTrial) {
                     // 这里做一个兜底，如果用户是激活状态但清空了输入框，我们依然希望后端能读到本地文件
                     // 所以传空字符串给后端，让后端逻辑去读 auth.key
                     activationCode = '';
                }

                const response = await fetch(
                    `/api/expire_date?machine_code=${encodeURIComponent(currentMachineCode)}&activation_code=${encodeURIComponent(activationCode)}`
                );
                const data = await response.json();
                
                if (data.status === 'success') {
                    expireDateInfo = {
                        expire_date: data.expire_date,
                        expire_date_str: data.expire_date_str,
                        source: data.source // 获取数据来源
                    };
                    updateExpireDateUI(expireDateInfo, null);
                } else {
                    updateExpireDateUI(null, data.message || '加载失败');
                }
            } catch (error) {
                updateExpireDateUI(null, '网络错误');
                console.error('加载到期时间失败:', error);
            }
        }

        function updateExpireDateUI(info, errorMsg) {
            const authStatusDiv = document.getElementById('authStatus');
            
            // 移除所有状态类
            authStatusDiv.classList.remove('expired', 'expiring-soon', 'valid', 'trial', 'activated', 'none');

            if (errorMsg) {
                authStatusDiv.textContent = `查询失败：${errorMsg}`;
                authStatusDiv.style.backgroundColor = '#fee2e2';
                authStatusDiv.style.color = '#991b1b';
                // 清除可能的来源显示
                clearSourceDisplay();
                return;
            }

            if (!info || !info.expire_date_str) {
                authStatusDiv.textContent = '未查询到到期时间';
                authStatusDiv.classList.add('none');
                clearSourceDisplay();
                return;
            }
            
            const now = Date.now();
            const expireTime = info.expire_date;
            const daysLeft = (expireTime - now) / (1000 * 60 * 60 * 24);
            
            if (daysLeft <= 0) {
                authStatusDiv.classList.add('expired');
                authStatusDiv.textContent = `已过期：${info.expire_date_str}`;
            } else if (daysLeft <= 7) {
                authStatusDiv.classList.add('expiring-soon');
                authStatusDiv.textContent = `即将过期（剩余${Math.ceil(daysLeft)}天）：${info.expire_date_str}`;
            } else {
                authStatusDiv.classList.add('valid');
                authStatusDiv.textContent = `有效至：${info.expire_date_str}`;
            }

            // 显示数据来源
            showSourceDisplay(info.source);
        }

        function showSourceDisplay(source) {
            let machineCodeDiv = document.getElementById('machineCodeDisplay');
            let sourceText = '';
            
            if (source === 'frontend') {
                sourceText = '数据来源：前端输入激活码';
            } else if (source === 'local_file') {
                sourceText = '数据来源：本地 auth.key 文件';
            } else {
                sourceText = '数据来源：未知';
            }

            // 在机器码下方或旁边显示来源，如果不存在则创建
            let sourceElement = document.getElementById('authDataSource');
            if (!sourceElement) {
                sourceElement = document.createElement('div');
                sourceElement.id = 'authDataSource';
                sourceElement.style.fontSize = '12px';
                sourceElement.style.color = '#6b7280';
                sourceElement.style.marginTop = '4px';
                sourceElement.style.fontStyle = 'italic';
                machineCodeDiv.parentNode.insertBefore(sourceElement, machineCodeDiv.nextSibling);
            }
            sourceElement.textContent = sourceText;
        }

        function clearSourceDisplay() {
            const sourceElement = document.getElementById('authDataSource');
            if (sourceElement) {
                sourceElement.textContent = '';
            }
        }

        function updateCheckExpireBtn() {
            const btn = document.getElementById('checkExpireBtn');
            // 只有当有机器码且已授权（试用或激活）时，才允许查询
            btn.disabled = !currentMachineCode || (!authStatus.isTrial && !authStatus.isActivated);
        }

        function updateAuthUI() {
            const trialBtn = document.getElementById('trialBtn');
            const activateBtn = document.getElementById('activateBtn');
            const deactivateBtn = document.getElementById('deactivateBtn');
            const activationInput = document.getElementById('activationInput');
            const authStatusDiv = document.getElementById('authStatus');

            // 如果当前显示的是到期时间信息，不要覆盖它，除非状态发生了根本变化（如反激活）
            // 但为了逻辑简单，如果用户手动切换状态，我们重置显示为基础状态
            if (!authStatusDiv.classList.contains('expired') && 
                !authStatusDiv.classList.contains('expiring-soon') && 
                !authStatusDiv.classList.contains('valid')) {
                
                if (authStatus.isTrial) {
                    authStatusDiv.textContent = '试用模式';
                    authStatusDiv.className = 'auth-status trial';
                } else if (authStatus.isActivated) {
                    authStatusDiv.textContent = '已激活';
                    authStatusDiv.className = 'auth-status activated';
                } else {
                    authStatusDiv.textContent = '未授权';
                    authStatusDiv.className = 'auth-status none';
                }
            }

            trialBtn.disabled = authStatus.hasKey;

            const inputLength = activationInput.value.length;
            activateBtn.disabled = inputLength !== 32 || authStatus.isActivated;
            deactivateBtn.disabled = inputLength !== 32 || !authStatus.isActivated;

            updateCheckExpireBtn();
            updateStartButton();
        }

        async function startTrial() {
            if (!currentMachineCode) {
                addLog('无法获取机器码，请稍后重试', 'error');
                return;
            }

            try {
                const response = await fetch('/api/trail', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        machine_code: currentMachineCode
                    })
                });

                const data = await response.json();
                
                if (data.status === 'success') {
                    addLog('试用已激活', 'success');
                    authStatus.hasKey = true;
                    authStatus.isTrial = true;
                    authStatus.isActivated = false;
                    updateAuthUI();
                    // 试用成功后自动查询一次
                    await loadExpireDate();
                } else {
                    addLog(data.message, 'error');
                }
            } catch (error) {
                addLog(`试用激活失败：${error.message}`, 'error');
            }
        }

        async function activate() {
            const activationCode = document.getElementById('activationInput').value;
            
            if (activationCode.length !== 32) {
                addLog('激活码必须为 32 个字符', 'error');
                return;
            }

            if (!currentMachineCode) {
                addLog('无法获取机器码，请稍后重试', 'error');
                return;
            }

            try {
                const response = await fetch('/api/activate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        machine_code: currentMachineCode,
                        activation_code: activationCode
                    })
                });

                const data = await response.json();
                
                if (data.status === 'success') {
                    addLog('激活成功', 'success');
                    authStatus.hasKey = true;
                    authStatus.isTrial = false;
                    authStatus.isActivated = true;
                    updateAuthUI();
                    // 激活成功后自动查询一次
                    await loadExpireDate();
                } else {
                    addLog(data.message, 'error');
                }
            } catch (error) {
                addLog(`激活失败：${error.message}`, 'error');
            }
        }

        async function deactivate() {
            const activationCode = document.getElementById('activationInput').value;
            
            if (activationCode.length !== 32) {
                addLog('激活码必须为 32 个字符', 'error');
                return;
            }

            try {
                const response = await fetch('/api/deactivate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        activation_code: activationCode
                    })
                });

                const data = await response.json();
                
                if (data.status === 'success') {
                    addLog('反激活成功', 'success');
                    authStatus.hasKey = false;
                    authStatus.isTrial = false;
                    authStatus.isActivated = false;
                    expireDateInfo = null;
                    updateAuthUI();
                    // 反激活后重置状态显示
                    const authStatusDiv = document.getElementById('authStatus');
                    authStatusDiv.textContent = '未授权';
                    authStatusDiv.className = 'auth-status none';
                } else {
                    addLog(data.message, 'error');
                }
            } catch (error) {
                addLog(`反激活失败：${error.message}`, 'error');
            }
        }

        // 新增：手动查询到期时间的按钮处理函数
        async function checkExpireDate() {
            if (!authStatus.isTrial && !authStatus.isActivated) {
                addLog('请先试用或激活', 'warning');
                return;
            }
            const btn = document.getElementById('checkExpireBtn');
            const originalText = btn.textContent;
            btn.textContent = '查询中...';
            btn.disabled = true;
            
            await loadExpireDate();
            
            btn.textContent = originalText;
            updateCheckExpireBtn();
        }

        document.getElementById('activationInput').addEventListener('input', function() {
            updateAuthUI();
        });

        // ==================== 原有功能函数 ====================

        function toggleCollapsible(contentId, chevronId) {
            const content = document.getElementById(contentId);
            const chevron = document.getElementById(chevronId);
            
            if (content.classList.contains('active')) {
                content.classList.remove('active');
                chevron.classList.remove('active');
            } else {
                content.classList.add('active');
                chevron.classList.add('active');
            }
        }

        document.getElementById('pdfFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file && file.type === 'application/pdf') {
                selectedFile = file;
                const fileNameDiv = document.getElementById('fileName');
                fileNameDiv.innerHTML = `
                    <span>${file.name}</span>
                    <button class="remove-file" onclick="removeFile()" title="移除文件">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                `;
                updateStartButton();
            } else {
                addLog('请选择 PDF 文件', 'error');
            }
        });

        function removeFile() {
            selectedFile = null;
            document.getElementById('pdfFile').value = '';
            document.getElementById('fileName').innerHTML = '';
            updateStartButton();
        }

        function updateStartButton() {
            const startButton = document.getElementById('startButton');
            const isAuthorized = authStatus.isTrial || authStatus.isActivated;
            startButton.disabled = !selectedFile || isProcessing || !isAuthorized;
            
            if (!isAuthorized && selectedFile) {
                startButton.title = '请先试用或激活后才能使用';
            } else {
                startButton.title = '';
            }
        }

        ['apiKey', 'baseUrl', 'model'].forEach(id => {
            document.getElementById(id).addEventListener('input', function() {
                llmConfigModified = true;
                document.getElementById('saveConfigBtn').disabled = false;
            });
        });

        function updateProgress(current, total) {
            const percentage = (current / total) * 100;
            document.getElementById('progress').style.width = percentage + '%';
        }

        function addLog(message, type = 'normal') {
            const log = document.getElementById('log');
            const entry = document.createElement('div');
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            if (type === 'error') entry.className = 'error';
            if (type === 'warning') entry.className = 'warning';
            if (type === 'success') entry.className = 'success';
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        async function uploadFiles() {
            const formData = new FormData();
            formData.append('pdf', selectedFile);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                if (data.status === 'success') {
                    currentSessionId = data.session_id;
                    addLog('文件上传成功', 'success');
                    return true;
                } else {
                    addLog(data.message, 'error');
                    return false;
                }
            } catch (error) {
                addLog(`上传失败：${error.message}`, 'error');
                return false;
            }
        }

        async function downloadResult() {
            try {
                const response = await fetch(`/download_result/${currentSessionId}`);
                if (response.ok) {
                    let filename = '处理结果.pdf';
                    const disposition = response.headers.get('Content-Disposition');
                    if (disposition && disposition.indexOf('attachment') !== -1) {
                        const filenameStarMatch = disposition.match(/filename\*=UTF-8''([^;]+)/i);
                        if (filenameStarMatch && filenameStarMatch[1]) {
                            filename = decodeURIComponent(filenameStarMatch[1]);
                        } else {
                            const filenameMatch = disposition.match(/filename="?([^";]+)"?/i);
                            if (filenameMatch && filenameMatch[1]) {
                                filename = decodeURIComponent(filenameMatch[1]);
                            }
                        }
                    }
                    
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                    addLog('文件下载成功', 'success');
                } else {
                    const data = await response.json();
                    addLog(data.message, 'error');
                }
            } catch (error) {
                addLog(`下载失败：${error.message}`, 'error');
            }
        }

        async function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function fetchWithTimeout(url, timeout) {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            
            try {
                const response = await fetch(url, {
                    signal: controller.signal
                });
                clearTimeout(id);
                return response;
            } catch (error) {
                clearTimeout(id);
                if (error.name === 'AbortError') {
                    throw new Error('请求超时');
                }
                throw error;
            }
        }

        async function runScript(scriptIndex, retryCount = 0) {
            if (!isProcessing) return;

            document.getElementById('status').textContent = '正在执行...';
            
            try {
                const ocrModel = 'qwen';
                const response = await fetchWithTimeout(
                    `/run_script/${currentSessionId}/${scriptIndex}/${retryCount}?ocr_model=${ocrModel}`,
                    FETCH_TIMEOUT
                );

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                
                if (data.status === 'completed') {
                    isProcessing = false;
                    document.getElementById('status').textContent = '所有脚本执行完成';
                    document.getElementById('startButton').disabled = false;
                    addLog('所有脚本执行完成', 'success');
                    await downloadResult();
                    return;
                }
                
                if (data.status === 'success') {
                    updateProgress(data.nextIndex, data.totalScripts);
                    document.getElementById('status').textContent = 
                        `正在执行：${data.currentScript} (${data.nextIndex}/${data.totalScripts})`;
                    addLog(data.message, 'success');
                    await sleep(SCRIPT_CHECK_INTERVAL);
                    runScript(data.nextIndex, 0);
                } else {
                    handleError(data, scriptIndex, retryCount);
                }
            } catch (error) {
                handleError({ message: error.message }, scriptIndex, retryCount);
            }
        }

        function handleError(data, scriptIndex, retryCount) {
            if (retryCount < MAX_RETRIES - 1) {
                const nextRetryCount = retryCount + 1;
                addLog(`执行失败，${RETRY_DELAY/1000}秒后进行第${nextRetryCount}次重试`, 'warning');
                document.getElementById('status').textContent = `等待重试 (${nextRetryCount}/${MAX_RETRIES})...`;
                setTimeout(() => runScript(scriptIndex, nextRetryCount), RETRY_DELAY);
            } else {
                isProcessing = false;
                document.getElementById('status').textContent = `执行失败，已重试${MAX_RETRIES}次`;
                document.getElementById('startButton').disabled = false;
                addLog(`执行失败，已达到最大重试次数：${data.message}`, 'error');
            }
        }

        async function startProcess() {
            if (isProcessing) return;
            
            if (!authStatus.isTrial && !authStatus.isActivated) {
                addLog('请先试用或激活后才能使用', 'error');
                return;
            }

            try {
                const activationCode = authStatus.isActivated ? 
                    document.getElementById('activationInput').value : '';
                
                const authResponse = await fetch(
                    `/api/auth?machine_code=${encodeURIComponent(currentMachineCode)}&activation_code=${encodeURIComponent(activationCode)}`
                );
                const authData = await authResponse.json();
                
                if (!authData.auth_passed) {
                    addLog(`鉴权失败：${authData.message}`, 'error');
                    return;
                }
                
                addLog('鉴权通过，开始执行', 'success');
            } catch (error) {
                addLog(`鉴权验证失败：${error.message}`, 'error');
                return;
            }
            
            const uploadSuccess = await uploadFiles();
            if (!uploadSuccess) return;

            isProcessing = true;
            document.getElementById('startButton').disabled = true;
            document.getElementById('progress').style.width = '0%';
            document.getElementById('log').innerHTML = '';
            addLog('开始执行脚本序列');
            runScript(0, 0);
        }

        async function testQwenService() {
            const modal = document.getElementById('testModal');
            const resultDiv = document.getElementById('testResult');
            
            resultDiv.innerHTML = '<p style="color: #4b5563;">正在测试模型服务状态...</p>';
            modal.style.display = 'block';
            
            try {
                const configResponse = await fetch('/get_llm_config');
                if (!configResponse.ok) {
                    throw new Error('获取 LLM 配置失败');
                }
                
                const configData = await configResponse.json();
                if (configData.status !== 'success') {
                    throw new Error(configData.message || '获取 LLM 配置失败');
                }
                
                const config = configData.config;
                
                const response = await fetch('/test_llm_service', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        api_key: config.api_key,
                        base_url: config.base_url,
                        model: config.model
                    })
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    resultDiv.innerHTML = `
                        <p style="color: #10b981; font-weight: 500;">✓ ${data.message}</p>
                        <p style="background: #f3f4f6; padding: 10px; border-radius: 6px; font-family: monospace;">响应内容：${data.response}</p>
                        <p style="color: #6b7280; font-size: 13px;">使用的模型：${config.model}</p>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <p style="color: #ef4444; font-weight: 500;">✗ 测试失败</p>
                        <p>错误信息：${data.message}</p>
                        <p>错误类型：${data.error_code}</p>
                        <p style="color: #6b7280; font-size: 13px;">尝试使用的模型：${config.model}</p>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <p style="color: #ef4444; font-weight: 500;">✗ 请求失败</p>
                    <p>错误信息：${error.message}</p>
                `;
            }
        }
        
        function closeTestModal() {
            document.getElementById('testModal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('testModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }

        async function loadLLMConfig() {
            try {
                const response = await fetch('/get_llm_config');
                if (!response.ok) {
                    throw new Error('获取 LLM 配置失败');
                }
                
                const data = await response.json();
                if (data.status === 'success') {
                    document.getElementById('apiKey').value = data.config.api_key;
                    document.getElementById('baseUrl').value = data.config.base_url;
                    document.getElementById('model').value = data.config.model;
                    
                    llmConfigModified = false;
                    document.getElementById('saveConfigBtn').disabled = true;
                } else {
                    throw new Error(data.message || '获取 LLM 配置失败');
                }
            } catch (error) {
                console.error('加载 LLM 配置失败:', error);
                addLog('加载 LLM 配置失败：' + error.message, 'error');
            }
        }

        async function saveLLMConfig() {
            try {
                const config = {
                    api_key: document.getElementById('apiKey').value,
                    base_url: document.getElementById('baseUrl').value,
                    model: document.getElementById('model').value
                };

                const response = await fetch('/save_llm_config', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(config)
                });

                if (!response.ok) {
                    throw new Error('保存 LLM 配置失败');
                }

                const data = await response.json();
                if (data.status !== 'success') {
                    throw new Error(data.message || '保存 LLM 配置失败');
                }

                llmConfigModified = false;
                document.getElementById('saveConfigBtn').disabled = true;
                addLog('LLM 配置保存成功', 'success');
            } catch (error) {
                console.error('保存 LLM 配置失败:', error);
                addLog('保存 LLM 配置失败：' + error.message, 'error');
            }
        }
    </script>
